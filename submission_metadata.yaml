# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A 5-stage highly optimized ranking pipeline designed for strict memory and 
  compute constraints (16GB RAM limit, CPU-only). Stage 1 (Streaming & Filtering): 
  Sequential streaming to apply honeypot filters and record integer byte-offsets. 
  Stage 2 (Hybrid Retrieval): Fuses pre-computed dense embeddings (bge-small-en-v1.5, 
  via .npy files) with a C-based BM25 sparse index (70% Dense / 30% BM25). 
  Stage 3 (Lazy Rehydration): Instant disk seeks via byte-offsets to fetch full JSON 
  metadata for only the top-K shortlisted candidates. Stage 4 (FlashRank Reranking): 
  Cross-encoder attention scoring using ms-marco-MiniLM-L-12-v2. Stage 5 (Final 
  Scoring & Generation): Applies deterministic behavioral heuristics, followed by 
  HR-formatted generative justifications using a 4-bit quantized LLM (llama-3.2-1b).

